<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#1769aa"><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="icon.svg"><title>Continent Clicker</title>
<style>
:root{--ink:#14213d;--sea:#dceef8;--land:#d5dbe5;--blue:#1769aa;--ok:#14804a;--no:#bd2f37}*{box-sizing:border-box}body{margin:0;background:#f7f9fc;color:var(--ink);font:16px system-ui,-apple-system,Segoe UI,sans-serif}main{max-width:1050px;margin:auto;padding:18px}h1{font-size:clamp(1.5rem,5vw,2.3rem);margin:0}.sub{margin:.3rem 0 1rem;color:#52627a}.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}button{font:inherit;font-weight:700;border:1px solid #cbd5e1;border-radius:10px;padding:10px 7px;background:#fff;color:var(--ink);touch-action:manipulation}.tabs button.active{background:var(--ink);color:#fff;border-color:var(--ink)}.layout{display:grid;grid-template-columns:minmax(0,1fr) 245px;gap:14px}.mapbox{position:relative;border:1px solid #c8d8e8;border-radius:15px;overflow:hidden;background:var(--sea);min-height:500px}svg{width:100%;min-height:500px;display:block}.country{fill:var(--land);stroke:#fff;stroke-width:.8;vector-effect:non-scaling-stroke;cursor:pointer}.country:hover{fill:#9fc7e6}.country.correct{fill:var(--ok)}.country.wrong{fill:var(--no)}.country.dim{fill:#c3ccd6}.panel{background:#fff;border:1px solid #d7e0ea;border-radius:15px;padding:16px}.eyebrow{font-size:.78rem;letter-spacing:.08em;font-weight:800;color:#5c6b80}.prompt{font-size:1.45rem;font-weight:800;margin:9px 0 16px}.score{background:#eef4f9;border-radius:10px;padding:12px;margin:16px 0;font-weight:800;line-height:1.55}.next{width:100%;background:var(--blue);border-color:var(--blue);color:#fff}.next:disabled{opacity:.5}.feedback{min-height:3.2em;font-weight:700;line-height:1.35}.good{color:var(--ok)}.bad{color:var(--no)}.loading{position:absolute;inset:0;display:grid;place-items:center;color:#52627a;font-weight:700}@media(max-width:700px){main{padding:12px}.tabs{grid-template-columns:repeat(2,1fr)}.layout{grid-template-columns:1fr}.panel{order:-1}.mapbox,svg{min-height:410px}}
</style></head><body><main><h1>Continent Clicker</h1><p class="sub">Choose a continent, then tap the named country.</p><nav class="tabs" aria-label="Continent"><button data-c="Africa">Africa</button><button data-c="Asia">Asia</button><button data-c="Europe">Europe</button><button data-c="North America">North America</button><button data-c="South America">South America</button></nav><section class="layout"><div class="mapbox"><div class="loading" id="load">Choose a continent to begin</div><svg id="map" viewBox="0 0 900 560" role="img" aria-label="Interactive map"></svg></div><aside class="panel"><div class="eyebrow" id="label">READY TO PLAY</div><div class="prompt" id="prompt">Pick a continent</div><div>Tap one country shape. Each round has one answer.</div><div class="score" id="score">Score&nbsp; 0 / 0<br>Streak&nbsp; 0</div><button class="next" id="next" disabled>Next country</button><p class="feedback" id="feedback" aria-live="assertive"></p></aside></section></main>
<script type="module">
import * as d3 from 'https://esm.sh/d3@7.9.0';import world from 'https://esm.sh/@d3-maps/atlas@1.0.0/world/countries/countries-110m';import{feature}from'https://esm.sh/topojson-client@3.1.0';
const groups={Africa:'DZA AGO BWA CMR COD CIV EGY ETH GHA KEN LBY MDG MAR MOZ NAM NGA RWA SEN ZAF TZA UGA ZMB ZWE'.split(' '),Asia:'AFG BGD CHN IND IDN IRN IRQ ISR JPN JOR KAZ MYS MNG MMR NPL PAK PHL SAU KOR THA TUR ARE VNM'.split(' '),Europe:'ALB AUT BEL BGR HRV CZE DNK FIN FRA DEU GRC HUN ISL IRL ITA NLD NOR POL PRT ROU RUS ESP SWE CHE UKR GBR'.split(' '),'North America':'BHS BLZ CAN CRI CUB DOM GTM HTI HND JAM MEX NIC PAN TTO USA'.split(' '),'South America':'ARG BOL BRA CHL COL ECU GUY PRY PER SUR URY VEN'.split(' ')};
const names={DZA:'Algeria',AGO:'Angola',BWA:'Botswana',CMR:'Cameroon',COD:'Democratic Republic of the Congo',CIV:'Côte d’Ivoire',EGY:'Egypt',ETH:'Ethiopia',GHA:'Ghana',KEN:'Kenya',LBY:'Libya',MDG:'Madagascar',MAR:'Morocco',MOZ:'Mozambique',NAM:'Namibia',NGA:'Nigeria',RWA:'Rwanda',SEN:'Senegal',ZAF:'South Africa',TZA:'Tanzania',UGA:'Uganda',ZMB:'Zambia',ZWE:'Zimbabwe',AFG:'Afghanistan',BGD:'Bangladesh',CHN:'China',IND:'India',IDN:'Indonesia',IRN:'Iran',IRQ:'Iraq',ISR:'Israel',JPN:'Japan',JOR:'Jordan',KAZ:'Kazakhstan',MYS:'Malaysia',MNG:'Mongolia',MMR:'Myanmar',NPL:'Nepal',PAK:'Pakistan',PHL:'Philippines',SAU:'Saudi Arabia',KOR:'South Korea',THA:'Thailand',TUR:'Turkey',ARE:'United Arab Emirates',VNM:'Vietnam',ALB:'Albania',AUT:'Austria',BEL:'Belgium',BGR:'Bulgaria',HRV:'Croatia',CZE:'Czechia',DNK:'Denmark',FIN:'Finland',FRA:'France',DEU:'Germany',GRC:'Greece',HUN:'Hungary',ISL:'Iceland',IRL:'Ireland',ITA:'Italy',NLD:'Netherlands',NOR:'Norway',POL:'Poland',PRT:'Portugal',ROU:'Romania',RUS:'Russia',ESP:'Spain',SWE:'Sweden',CHE:'Switzerland',UKR:'Ukraine',GBR:'United Kingdom',BHS:'The Bahamas',BLZ:'Belize',CAN:'Canada',CRI:'Costa Rica',CUB:'Cuba',DOM:'Dominican Republic',GTM:'Guatemala',HTI:'Haiti',HND:'Honduras',JAM:'Jamaica',MEX:'Mexico',NIC:'Nicaragua',PAN:'Panama',TTO:'Trinidad and Tobago',USA:'United States',ARG:'Argentina',BOL:'Bolivia',BRA:'Brazil',CHL:'Chile',COL:'Colombia',ECU:'Ecuador',GUY:'Guyana',PRY:'Paraguay',PER:'Peru',SUR:'Suriname',URY:'Uruguay',VEN:'Venezuela'};
const iso=f=>String(f.properties.id||f.id||'').toUpperCase(),all=feature(world,world.objects.features).features,svg=d3.select('#map'),load=document.querySelector('#load'),prompt=document.querySelector('#prompt'),feedback=document.querySelector('#feedback'),scoreEl=document.querySelector('#score'),next=document.querySelector('#next'),label=document.querySelector('#label');let continent,visible,answer,answered,score=0,attempts=0,streak=0;
function title(f){return names[iso(f)]||f.properties.name||iso(f)}function stats(){scoreEl.innerHTML=`Score&nbsp; ${score} / ${attempts}<br>Streak&nbsp; ${streak}`}function render(){let p=d3.geoMercator().fitExtent([[22,22],[878,538]],{type:'FeatureCollection',features:visible}),path=d3.geoPath(p);svg.selectAll('*').remove();svg.append('g').selectAll('path').data(visible).join('path').attr('class','country').attr('d',path).attr('aria-label',title).on('click',(_,d)=>guess(iso(d)))}function start(c){continent=c;score=attempts=streak=0;document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.c===c));visible=all.filter(f=>groups[c].includes(iso(f)));load.style.display='none';round()}function round(){answer=visible[Math.floor(Math.random()*visible.length)];answered=false;prompt.textContent=title(answer);label.textContent=`${continent.toUpperCase()} · FIND THIS COUNTRY`;feedback.textContent='';feedback.className='feedback';next.disabled=true;stats();render()}function guess(code){if(answered)return;answered=true;attempts++;let correct=code===iso(answer);if(correct){score++;streak++;feedback.textContent=`Correct — that’s ${title(answer)}!`;feedback.className='feedback good'}else{streak=0;feedback.textContent=`Not quite — ${title(answer)} is highlighted.`;feedback.className='feedback bad'}svg.selectAll('.country').classed('correct',d=>iso(d)===iso(answer)).classed('wrong',d=>iso(d)===code&&!correct).classed('dim',d=>iso(d)!==iso(answer)&&iso(d)!==code);next.disabled=false;stats()}document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>start(b.dataset.c));next.onclick=round;if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script></body></html>
